<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Moth</title>
<style>
    body { margin: 0; overflow: hidden; background: #0d0221; font-family: sans-serif; }
    canvas { display: block; margin: 0 auto; background: black; }
    #score {
        position: absolute; top: 20px; left: 20px;
        color: white; font-size: 32px; font-weight: bold;
        text-shadow: 2px 2px 4px black; display: none;
    }
    #titleScreen, #restartBtn {
        position: absolute; left: 50%; transform: translateX(-50%);
        color: white; text-align: center;
    }
    #titleScreen { top: 200px; }
    #titleScreen h1 {
        font-size: 64px; margin-bottom: 20px;
        text-shadow: 3px 3px 6px black;
    }
    #titleScreen button, #restartBtn {
        padding: 12px 24px; font-size: 24px;
        background: #4a8f3f; border: none; border-radius: 8px;
        cursor: pointer; color: white; box-shadow: 2px 2px 6px black;
    }
    #restartBtn { top: 350px; display: none; }
</style>
</head>
<body>

<canvas id="game" width="480" height="640"></canvas>
<div id="score">0</div>

<div id="titleScreen">
    <h1>Flappy Moth</h1>
    <button id="startBtn">Start</button>
</div>

<button id="restartBtn">Restart</button>

<script>
// ---------- ASSETS ----------
const mothFrames = [new Image(), new Image()];
mothFrames[0].src = "moth1.png";
mothFrames[1].src = "moth2.png";

const treeImg = new Image();
treeImg.src = "tree.png"; // obstacle sprite

// ---------- CANVAS ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ---------- GAME STATE ----------
let score = 0;
let gameOver = false;
let gameStarted = false;
let frame = 0;

// ---------- MOTH ----------
const moth = {
    x: 100,
    y: canvas.height / 2,
    width: 60,
    height: 60,
    velocity: 0,
    gravity: 0.4,
    jumpStrength: -7,
    frame: 0,
    frameTick: 0
};

function drawMoth() {
    moth.frameTick++;
    if (moth.frameTick % 10 === 0) {
        moth.frame = (moth.frame + 1) % 2;
    }
    ctx.drawImage(mothFrames[moth.frame], moth.x, moth.y, moth.width, moth.height);
}

// ---------- TREES (PIPES) ----------
let pipes = [];
const pipeWidth = 80;
const pipeGap = 180;

function spawnPipe() {
    const topHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: topHeight + pipeGap,
        scored: false
    });
}

function updatePipes() {
    pipes.forEach(pipe => {
        pipe.x -= 3;

        // scoring when moth passes the tree
        if (!pipe.scored && pipe.x + pipeWidth < moth.x) {
            pipe.scored = true;
            score++;
            document.getElementById("score").textContent = score;
        }

        // collision
        const hitHorizontally =
            moth.x < pipe.x + pipeWidth &&
            moth.x + moth.width > pipe.x;

        const hitVertically =
            moth.y < pipe.top || moth.y + moth.height > pipe.bottom;

        if (hitHorizontally && hitVertically) {
            endGame();
        }
    });

    // remove off-screen pipes
    pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);
}

function drawPipes() {
    pipes.forEach(pipe => {
        // top tree
        ctx.drawImage(
            treeImg,
            pipe.x,
            pipe.top - treeImg.height,
            pipeWidth,
            treeImg.height
        );
        // bottom tree
        ctx.drawImage(
            treeImg,
            pipe.x,
            pipe.bottom,
            pipeWidth,
            treeImg.height
        );
    });
}

// ---------- GAME LOOP ----------
function update() {
    if (!gameStarted || gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // moth physics
    moth.velocity += moth.gravity;
    moth.y += moth.velocity;

    // spawn pipes
    if (frame % 120 === 0) {
        spawnPipe();
    }

    updatePipes();
    drawPipes();
    drawMoth();

    // ground / ceiling collision
    if (moth.y + moth.height > canvas.height || moth.y < 0) {
        endGame();
    }

    frame++;
    requestAnimationFrame(update);
}

function endGame() {
    if (gameOver) return;
    gameOver = true;
    document.getElementById("restartBtn").style.display = "block";
}

// ---------- CONTROLS ----------
function flap() {
    if (!gameStarted || gameOver) return;
    moth.velocity = moth.jumpStrength;
}

document.addEventListener("keydown", flap);
document.addEventListener("mousedown", flap);

// ---------- START / RESTART ----------
document.getElementById("startBtn").onclick = () => {
    document.getElementById("titleScreen").style.display = "none";
    document.getElementById("score").style.display = "block";
    gameStarted = true;
    gameOver = false;
    update();
};

document.getElementById("restartBtn").onclick = () => {
    score = 0;
    frame = 0;
    moth.y = canvas.height / 2;
    moth.velocity = 0;
    pipes = [];
    gameOver = false;
    document.getElementById("score").textContent = "0";
    document.getElementById("restartBtn").style.display = "none";
    update();
};
</script>

</body>
</html>
