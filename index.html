<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Mothman – Bridge Collapse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- START SCREEN -->
  <div id="startScreen">
    <div id="titleContainer">
      <img id="mothTitleImage" src="moth1.png" alt="Mothman">
      <h1>FLAPPY MOTHMAN</h1>
      <p id="subtitle">Into the Red Mist</p>
      <p id="startPrompt">Tap to Begin</p>
    </div>
  </div>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen">
  <h1>GAME OVER</h1>

  <p id="finalScore"></p>

  <div id="initialEntry" style="display:none;">
    <p>New High Score!</p>
    <p>Enter Your Initials:</p>
    <input id="initialInput" maxlength="3" autocomplete="off" />
    <button id="saveInitialsBtn">Save</button>
  </div>

  <p id="highScoreDisplay"></p>

  <button id="restartBtn">Restart</button>
</div>


  <!-- GAME CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <script src="game.js"></script>
</body>
</html>
