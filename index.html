<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Moth</title>
<style>
    body { margin: 0; overflow: hidden; background: #0d0221; font-family: sans-serif; }
    canvas { display: block; margin: 0 auto; background: black; }
    #score { position: absolute; top: 20px; left: 20px; color: white; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px black; display: none; }
    #titleScreen, #restartBtn {
        position: absolute; left: 50%; transform: translateX(-50%);
        color: white; text-align: center;
    }
    #titleScreen { top: 200px; }
    #titleScreen h1 { font-size: 64px; margin-bottom: 20px; text-shadow: 3px 3px 6px black; }
    #titleScreen button, #restartBtn {
        padding: 12px 24px; font-size: 24px;
        background: #4a8f3f; border: none; border-radius: 8px;
        cursor: pointer; color: white; box-shadow: 2px 2px 6px black;
    }
    #restartBtn { top: 350px; display: none; }
</style>
</head>
<body>

<canvas id="game" width="480" height="640"></canvas>
<div id="score">0</div>

<div id="titleScreen">
    <h1>Flappy Moth</h1>
    <button id="startBtn">Start</button>
</div>

<button id="restartBtn">Restart</button>

<script>
// Load moth frames
const mothFrames = [new Image(), new Image()];
mothFrames[0].src = "moth1.png";
mothFrames[1].src = "moth2.png";

// Canvas setup
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0, gameOver = false, gameStarted = false;

// Moth player
const moth = {
    x: 100, y: canvas.height / 2, width: 60, height: 60,
    velocity: 0, gravity: 0.4, jumpStrength: -7,
    frame: 0, frameTick: 0
};

function drawMoth() {
    moth.frameTick++;
    if (moth.frameTick % 10 === 0) moth.frame = (moth.frame + 1) % 2;
    ctx.drawImage(mothFrames[moth.frame], moth.x, moth.y, moth.width, moth.height);
}

// Pipes
let pipes = [];
const pipeWidth = 80, pipeGap = 180;

function spawnPipe() {
    const topHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
    pipes.push({ x: canvas.width, top: topHeight, bottom: topHeight + pipeGap });
}

function drawPipes() {
    ctx.fillStyle = "#4a8f3f";
    pipes.forEach(pipe => {
     const treeImg = new Image();
treeImg.src = "tree.png"; // your generated tree image

function drawTrees() {
  pipes.forEach(pipe => {
    ctx.drawImage(treeImg, pipe.x, pipe.top - treeImg.height, pipeWidth, treeImg.height);
    ctx.drawImage(treeImg, pipe.x, pipe.bottom, pipeWidth, treeImg.height);
  });
}


// Game loop
let frame = 0;

function update() {
    if (!gameStarted || gameOver) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    moth.velocity += moth.gravity;
    moth.y += moth.velocity;

    if (frame % 120 === 0) spawnPipe();

    pipes.forEach(pipe => {
        pipe.x -= 3;
       if (!pipe.scored && pipe.x + pipeWidth < moth.x) {
    score++;
    pipe.scored = true;
    document.getElementById("score").textContent = score;
}
        if (
            moth.x < pipe.x + pipeWidth &&
            moth.x + moth.width > pipe.x &&
            (moth.y < pipe.top || moth.y + moth.height > pipe.bottom)
        ) endGame();
    });

    pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);

    if (moth.y + moth.height > canvas.height || moth.y < 0) endGame();

    drawPipes();
    drawMoth();

    frame++;
    requestAnimationFrame(update);
}

function endGame() {
    gameOver = true;
    document.getElementById("restartBtn").style.display = "block";
}

// Controls
function flap() {
    if (!gameOver && gameStarted) moth.velocity = moth.jumpStrength;
}
document.addEventListener("keydown", flap);
document.addEventListener("mousedown", flap);

// Start + Restart
document.getElementById("startBtn").onclick = () => {
    document.getElementById("titleScreen").style.display = "none";
    document.getElementById("score").style.display = "block";
    gameStarted = true;
    update();
};

document.getElementById("restartBtn").onclick = () => {
    score = 0;
    moth.y = canvas.height / 2;
    moth.velocity = 0;
    pipes = [];
    frame = 0;
    gameOver = false;
    document.getElementById("score").textContent = "0";
    document.getElementById("restartBtn").style.display = "none";
    update();
};
</script>

</body>
</html>
